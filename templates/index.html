<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteBin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Afacad+Flux:wght@100..1000&family=Sixtyfour+Convergence&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Source Code Pro", monospace;
        }
        h1 {
            text-align: center;
            padding: 1.5rem;
            font-family: "Source Code Pro", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
            font-variation-settings:
                "BLED" 0,
                "SCAN" 0,
                "XELA" 0,
                "YELA" 0;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: start;
            align-items: center;
            width: 100vw;
            height: 100vh;
            margin: 0;
        }
        .paste__section {
            display: flex;
            flex-direction: column;
            justify-content: start;
            align-items: center;
            margin-top: 1rem;
        }
        textarea {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            font-family: "Source Code Pro", monospace;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }
        button {
            margin: 1rem;
            padding: .2rem;
            padding-left: 1rem;
            padding-right: 1rem;
        }
        .button-group {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .last-updated {
            color: #888;
            font-size: 0.8rem;
            margin-top: auto;
            padding: 1rem;
        }
        .update-banner {
            display: none;
            align-items: center;
            gap: 0.75rem;
            margin: 0.5rem 0;
            padding: 0.5rem 1rem;
            background: #fff3cd;
            border: 1px solid #ffe69c;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .update-banner button {
            margin: 0;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <h1>PasteBin 🗑️</h1>

    <form method="POST" class="paste__section">
        <textarea id="pasteContent" name="content" rows="10" cols="50">{{ current_text }}</textarea><br>

        <div class="button-group">
            <button type="submit">⬆️ Upload</button>
            <button type="button" onclick="copyText()">📋 Copy</button>
        </div>
    </form>

    <div id="updateBanner" class="update-banner">
        <span>A newer version was saved by someone else.</span>
        <button type="button" onclick="loadPending()">Load it (discards your edits)</button>
    </div>

    <p id="lastUpdated" class="last-updated">{% if last_updated %}Last updated: {{ last_updated }}{% endif %}</p>

    <script>
        let currentVersion = {{ current_version }};
        let isDirty = false;        // user has unsaved local edits
        let pendingUpdate = null;   // remote update deferred because of unsaved edits

        function fireConfetti() {
            const colors = ['#ff0000', '#ff69b4', '#ff1493', '#dc143c', '#c71585'];

            // Left side burst
            confetti({
                particleCount: 150,
                spread: 120,
                angle: 60,
                origin: { x: 0, y: 0.5 },
                colors: colors
            });

            // Right side burst
            confetti({
                particleCount: 150,
                spread: 120,
                angle: 120,
                origin: { x: 1, y: 0.5 },
                colors: colors
            });

            // Center burst
            confetti({
                particleCount: 200,
                spread: 180,
                origin: { y: 0.4 },
                colors: colors
            });
        }

        function checkForHeart(content) {
            if (content.includes('❤️') || content.includes('❤')) {
                fireConfetti();
            }
        }

        async function copyText() {
            const textarea = document.getElementById('pasteContent');

            // Prefer the modern async Clipboard API; fall back to execCommand.
            try {
                await navigator.clipboard.writeText(textarea.value);
            } catch (err) {
                textarea.select();
                textarea.setSelectionRange(0, 99999); // For mobile devices
                document.execCommand('copy');
            }

            alert("Text copied to clipboard");
        }

        // Apply a remote update to the textarea and fire any side effects.
        function applyUpdate(data) {
            const textarea = document.getElementById('pasteContent');
            textarea.value = data.content;
            currentVersion = data.version;
            isDirty = false;
            document.getElementById('updateBanner').style.display = 'none';
            pendingUpdate = null;

            const lastUpdatedEl = document.getElementById('lastUpdated');
            if (data.last_updated) {
                lastUpdatedEl.textContent = 'Last updated: ' + data.last_updated;
            }

            checkForHeart(data.content);
        }

        // Called from the conflict banner: discard local edits and load the
        // newer remote version.
        function loadPending() {
            if (pendingUpdate) {
                applyUpdate(pendingUpdate);
            }
        }

        // Set up Server-Sent Events for real-time updates
        function setupSSE() {
            const eventSource = new EventSource('/pastebin/stream');

            eventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);

                // Ignore stale or already-applied versions.
                if (data.version <= currentVersion) {
                    return;
                }

                // If the user has unsaved edits, don't clobber them — defer the
                // update and offer to load it via the banner instead.
                if (isDirty) {
                    pendingUpdate = data;
                    document.getElementById('updateBanner').style.display = 'flex';
                    return;
                }

                applyUpdate(data);
            };

            eventSource.onerror = function(error) {
                console.error('SSE connection error:', error);
                eventSource.close();
                // Reconnect after 3 seconds
                setTimeout(setupSSE, 3000);
            };
        }

        // Track unsaved local edits so remote updates don't overwrite them.
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('pasteContent').addEventListener('input', function() {
                isDirty = true;
            });
            setupSSE();
        });
    </script>
</body>
</html>
